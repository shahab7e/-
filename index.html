
<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منظومه خدمات هوشمند</title>
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --bg: #F0F2F5; --surface: #FFFFFF; --border: #E2E8F0;
            --text-primary: #0F172A; --text-secondary: #475569; --text-muted: #94A3B8;
            --accent: #2563EB; --accent-soft: #EFF6FF;
            --green: #16A34A; --green-bg: #F0FDF4;
            --amber: #D97706; --amber-bg: #FFFBEB;
            --blue: #0284C7; --blue-bg: #F0F9FF;
            --font: "Vazirmatn", sans-serif;
        }
        html, body { height: 100%; overflow: hidden; font-family: var(--font); background: var(--bg); }
        #app { display: flex; flex-direction: column; height: 100vh; }
        #topbar {
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 20px; height: 52px; flex-shrink: 0;
            background: var(--surface); border-bottom: 1px solid var(--border);
        }
        .brand { display: flex; align-items: center; gap: 9px; }
        .brand-logo {
            width: 30px; height: 30px; background: var(--accent);
            border-radius: 7px; display: flex; align-items: center; justify-content: center;
        }
        .brand-logo svg { width: 16px; height: 16px; stroke: white; fill: none; stroke-width: 2; }
        .brand-name { font-size: 0.88rem; font-weight: 700; color: var(--text-primary); }
        .brand-sub  { font-size: 0.7rem; color: var(--text-muted); }
        .topbar-hint {
            display: flex; align-items: center; gap: 5px;
            padding: 5px 11px; background: var(--accent-soft);
            border-radius: 20px; font-size: 0.72rem; font-weight: 500; color: var(--accent);
        }
        .topbar-hint svg { width: 13px; height: 13px; stroke: var(--accent); fill: none; stroke-width: 2; }
        #body { display: flex; flex: 1; overflow: hidden; }
        #sidebar {
            width: 300px; flex-shrink: 0; background: var(--surface);
            border-left: 1px solid var(--border); overflow-y: auto; display: flex; flex-direction: column;
        }
        .sb-header { height: 43px; padding: 0 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; }
        .sb-header-title { font-size: 0.65rem; font-weight: 700; text-transform: uppercase; color: var(--text-muted); }
        .svc-card { display: flex; flex-direction: column; animation: fadeSlide .18s ease-out; }
        @keyframes fadeSlide { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .svc-title-block { padding: 16px; border-bottom: 1px solid var(--border); }
        .svc-name { font-size: 0.95rem; font-weight: 700; color: var(--text-primary); line-height: 1.5; margin-bottom: 10px; }
        .sbadge { display: inline-flex; align-items: center; gap: 5px; padding: 3px 9px; border-radius: 20px; font-size: 0.7rem; font-weight: 600; }
        .sbadge-dot { width: 5px; height: 5px; border-radius: 50%; }
        .s-active { background: var(--green-bg); color: var(--green); } .s-active .sbadge-dot { background: var(--green); }
        .s-ready  { background: var(--blue-bg);  color: var(--blue); } .s-ready  .sbadge-dot { background: var(--blue); }
        .s-soon   { background: var(--amber-bg); color: var(--amber); } .s-soon   .sbadge-dot { background: var(--amber); }
        .svc-desc-block { padding: 14px 16px; border-bottom: 1px solid var(--border); background: #FAFBFC; }
        .block-label { font-size: 0.65rem; font-weight: 700; color: var(--text-muted); margin-bottom: 6px; }
        .svc-desc { font-size: 0.8rem; color: var(--text-secondary); line-height: 1.85; text-align: justify; }
        .meta-row { display: flex; flex-direction: column; gap: 3px; padding: 11px 16px; border-bottom: 1px solid var(--border); }
        .meta-val { font-size: 0.82rem; color: var(--text-secondary); font-weight: 500; }
        #chart-wrap { flex: 1; position: relative; overflow: hidden; background: var(--surface); }
        #col-headers {
            position: absolute; top: 0; left: 0; right: 0; height: 43px; z-index: 10;
            display: flex; align-items: center; border-bottom: 1px solid var(--border); background: var(--surface);
        }
        .col-hdr { position: absolute; font-size: 0.73rem; font-weight: 600; color: var(--text-secondary); transform: translateX(-50%); }
        #chart-canvas { width: 100%; height: 100%; }
        .empty-state { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 32px 20px; text-align: center; gap: 12px; }
        .empty-icon { width: 48px; height: 48px; border-radius: 50%; background: var(--bg); display: flex; align-items: center; justify-content: center; }
        .empty-icon svg { width: 22px; height: 22px; stroke: var(--text-muted); fill: none; stroke-width: 1.5; }
    </style>
</head>
